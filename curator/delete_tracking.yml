actions:
        1:
                action: delete_indices
                description: >-
                        Delete tracking- entries older than 60 days (based on index name). Ignore
                        the error if the filter does not result in an actionable list of indices
                        and exit cleanly.
                options:
                        ignore_empty_list: True
                        timeout_override:
                        continue_if_exception: False
                        disable_action: False
                filters:
                        - filtertype: pattern
                          kind: prefix
                          value: tracking-
                          exclude:
                        - filtertype: age
                          source: name
                          direction: older
                          timestring: '%Y.%m.%d'
                          unit: days
                          unit_count: 60
                          exclude:
